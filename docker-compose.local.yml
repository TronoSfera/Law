services:
  frontend:
    ports:
      - "8081:80"
      - "8080:80"

  backend:
    ports:
      - "8002:8000"

  db:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  minio:
    ports:
      - "${LOCAL_MINIO_API_PORT:-19100}:9000"
      - "${LOCAL_MINIO_CONSOLE_PORT:-19101}:9001"

  # Local/dev: use multi-arch image (works on Apple Silicon/ARM64).
  clamav:
    image: mkodockx/docker-clamav:alpine
